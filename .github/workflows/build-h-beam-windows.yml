name: Build h-beam Windows MSI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: h-beam
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            h-beam/node_modules/pake-cli/src-tauri/target
          key: ${{ runner.os }}-cargo-pake-${{ hashFiles('h-beam/index.html') }}
          restore-keys: |
            ${{ runner.os }}-cargo-pake-

      - name: Install pake-cli
        shell: bash
        run: |
          npm init -y > /dev/null
          npm install pake-cli --no-fund --no-audit

      - name: Build MSI
        shell: bash
        run: npx pake ./index.html --name "SteelCut Pro" --width 1520 --height 900

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: SteelCut-Pro-Windows
          path: h-beam/SteelCut Pro.msi
          if-no-files-found: error
